<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Karaoke Queue</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background: #10121a; color: #eee;
    padding: 0.8rem; padding-bottom: calc(4.4rem + env(safe-area-inset-bottom));
  }
  h1 { font-size: 1.15rem; margin-bottom: 0.6rem; }
  h2 { font-size: 1rem; margin: 0.3rem 0 0.5rem; }
  input {
    width: 100%; padding: 0.6em 0.9em; font-size: 1rem;
    border-radius: 10px; border: 1px solid #2a2f45;
    background: #1a1e2e; color: #eee; margin-bottom: 0.7rem;
  }
  .song {
    display: flex; align-items: center; gap: 0.7rem;
    padding: 0.45rem; border-radius: 10px; background: #1a1e2e;
    margin-bottom: 0.45rem; border: 1px solid #2a2f45;
  }
  .song img, .song .ph {
    width: 52px; height: 52px; border-radius: 6px; object-fit: cover;
    background: #0c0e16; flex: none;
    display: grid; place-items: center; color: #2a2f45; font-size: 1.4rem;
  }
  .meta { flex: 1; min-width: 0; }
  .t { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .a { color: #9aa3b8; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dur { color: #6b7690; font-size: 0.75rem; font-variant-numeric: tabular-nums; }
  .badge { font-size: 0.6rem; font-weight: 700; padding: 1px 5px; border-radius: 4px; background: #0c0e16; color: #ff7ab0; margin-left: 4px; }
  .done { color: #7fce7f; margin-left: 4px; font-size: 0.85em; }
  button {
    border: none; border-radius: 8px; padding: 0.55em 1em;
    background: #37b6ff; color: #062033; font-weight: 700; font-size: 0.95rem;
  }
  button:disabled { background: #2a2f45; color: #9aa3b8; }
  #np-card {
    background: #101d2a; border: 1px solid #37b6ff; border-radius: 10px;
    padding: 0.7rem 0.9rem; margin-bottom: 0.8rem;
  }
  #np-card .label { color: #37b6ff; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.05em; }
  ol { list-style: none; padding: 0; }
  ol li {
    display: flex; align-items: center; gap: 0.6rem;
    background: #1a1e2e; border: 1px solid #2a2f45; border-radius: 10px;
    padding: 0.55rem 0.7rem; margin-bottom: 0.45rem;
  }
  ol li .handle { color: #6b7690; flex: none; font-size: 1.1rem; padding: 0 0.2rem; touch-action: none; cursor: grab; }
  ol li.dragging { opacity: 0.6; border-color: #37b6ff; }
  ol li .pos { color: #37b6ff; font-weight: 700; flex: none; width: 1.4em; }
  ol li .eta { color: #ffcf40; font-weight: 700; flex: none; font-variant-numeric: tabular-nums; }
  ol li .rm { flex: none; background: none; border: none; color: #9aa3b8; font-size: 1.3rem; padding: 0 0.3rem; }
  ol li .rm:active { color: #ff7a7a; }
  /* Queue entries wrap so full names stay readable */
  ol li .t, ol li .a { white-space: normal; word-break: break-word; overflow: visible; text-overflow: unset; }
  .tabs {
    position: fixed; left: 0; right: 0; bottom: 0; display: flex;
    background: #171b29; border-top: 1px solid #2a2f45;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .tabs button {
    flex: 1; background: none; color: #9aa3b8; border-radius: 0;
    padding: 0.85em 0; font-size: 1rem;
  }
  .tabs button.active { color: #37b6ff; border-top: 2px solid #37b6ff; }
  .toast {
    position: fixed; left: 50%; transform: translateX(-50%);
    bottom: 4.4rem; background: rgba(0,0,0,0.85); color: #ffcf40;
    padding: 0.5em 1em; border-radius: 8px; opacity: 0; transition: opacity 0.25s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .empty { color: #9aa3b8; }
</style>
</head>
<body>
  <h1>🎤 Karaoke</h1>

  <div id="page-songs">
    <input id="singer" placeholder="Your name (shown with the song)" maxlength="40" />
    <input id="search" type="search" placeholder="Search artist, title, tags…" />
    <div id="list"></div>
  </div>

  <div id="page-queue" style="display:none">
    <div id="np-card">
      <div class="label">NOW PLAYING</div>
      <div id="np" class="t">Nothing playing</div>
    </div>
    <h2>Up next</h2>
    <ol id="queuelist"></ol>
    <p id="qempty" class="empty">Queue is empty — add songs from the Songs tab.</p>
  </div>

  <nav class="tabs">
    <button id="tab-songs" class="active">Songs</button>
    <button id="tab-queue">Queue <span id="qcount"></span></button>
  </nav>
  <div id="toast" class="toast"></div>

<script>
  const $ = (id) => document.getElementById(id);
  let songs = [];
  let played = new Set();

  const savedName = localStorage.getItem("karaoke.singer") || "";
  $("singer").value = savedName;
  $("singer").addEventListener("input", () => localStorage.setItem("karaoke.singer", $("singer").value));

  function showTab(which) {
    $("page-songs").style.display = which === "songs" ? "block" : "none";
    $("page-queue").style.display = which === "queue" ? "block" : "none";
    $("tab-songs").classList.toggle("active", which === "songs");
    $("tab-queue").classList.toggle("active", which === "queue");
    if (which === "queue") refreshQueue();
  }
  $("tab-songs").onclick = () => showTab("songs");
  $("tab-queue").onclick = () => showTab("queue");

  function toast(msg) {
    const t = $("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 1800);
  }

  function norm(s) {
    return s.normalize("NFKD").replace(/[̀-ͯ]/g, "").toLowerCase();
  }

  function render() {
    const q = norm($("search").value.trim());
    const list = $("list");
    list.innerHTML = "";
    for (const s of songs) {
      if (q && !norm(s.artist + " " + s.title + " " + (s.creator || "") + " " + (s.tags || "")).includes(q)) continue;
      const div = document.createElement("div");
      div.className = "song";
      const img = document.createElement("img");
      img.loading = "lazy";
      img.src = "/api/cover/" + s.id;
      img.onerror = () => { const ph = document.createElement("div"); ph.className = "ph"; ph.textContent = "♪"; img.replaceWith(ph); };
      const meta = document.createElement("div");
      meta.className = "meta";
      const t = document.createElement("div");
      t.className = "t";
      t.textContent = s.title;
      if (s.isDuet) { const b = document.createElement("span"); b.className = "badge"; b.textContent = "DUET"; t.appendChild(b); }
      if (played.has(s.id)) { const d = document.createElement("span"); d.className = "done"; d.textContent = "✓"; d.title = "Already sung"; t.appendChild(d); }
      const a = document.createElement("div");
      a.className = "a";
      a.textContent = s.artist;
      meta.append(t, a);
      if (s.durationMs) {
        const dur = document.createElement("div");
        dur.className = "dur";
        const sec = Math.max(0, Math.round(s.durationMs / 1000));
        dur.textContent = Math.floor(sec / 60) + ":" + String(sec % 60).padStart(2, "0");
        meta.append(dur);
      }
      const btn = document.createElement("button");
      btn.textContent = "Queue";
      btn.onclick = async () => {
        btn.disabled = true;
        try {
          const res = await fetch("/api/queue", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ songId: s.id, singerName: $("singer").value.trim() || null }),
          });
          if (!res.ok) throw new Error(res.status);
          toast("Added: " + s.title);
          refreshQueue();
        } catch (e) {
          toast("Failed to add");
        } finally {
          setTimeout(() => (btn.disabled = false), 1200);
        }
      };
      div.append(img, meta, btn);
      list.appendChild(div);
    }
    if (!list.children.length) list.innerHTML = '<p class="empty">No songs found.</p>';
  }

  async function loadSongs() {
    try {
      songs = await (await fetch("/api/songs")).json();
      render();
    } catch { toast("Could not load songs"); }
  }

  async function refreshPlayed() {
    try {
      const ids = await (await fetch("/api/played")).json();
      if (ids.length !== played.size) {
        played = new Set(ids);
        render();
      }
    } catch { /* server briefly unreachable */ }
  }

  async function refreshQueue() {
    refreshPlayed();
    try {
      const q = await (await fetch("/api/queue")).json();
      $("np").textContent = q.nowPlaying
        ? q.nowPlaying.song.title + " — " + (q.nowPlaying.singer || q.nowPlaying.song.artist)
        : "Nothing playing";
      $("qcount").textContent = q.queue.length ? "(" + q.queue.length + ")" : "";

      if (dragActive) return; // don't overwrite the list under the user's finger
      const list = $("queuelist");
      list.innerHTML = "";
      // Estimated start: remaining time of the playing song plus durations
      // of everything queued before the item.
      let acc = q.remainingMs || 0;
      q.queue.forEach((item, i) => {
        const li = document.createElement("li");
        li.dataset.uid = item.uid;
        const handle = document.createElement("span");
        handle.className = "handle";
        handle.textContent = "⠿";
        const pos = document.createElement("span");
        pos.className = "pos";
        pos.textContent = i + 1;
        const meta = document.createElement("div");
        meta.className = "meta";
        const t = document.createElement("div");
        t.className = "t";
        t.textContent = item.song.title;
        const a = document.createElement("div");
        a.className = "a";
        a.textContent = item.song.artist + (item.singer ? " — " + item.singer : "");
        meta.append(t, a);
        const eta = document.createElement("span");
        eta.className = "eta";
        const sec = Math.max(0, Math.round(acc / 1000));
        eta.textContent = "+" + Math.floor(sec / 60) + ":" + String(sec % 60).padStart(2, "0");
        acc += item.song.durationMs || 0;
        const rm = document.createElement("button");
        rm.className = "rm";
        rm.textContent = "×";
        rm.onclick = async () => {
          rm.disabled = true;
          try {
            await fetch("/api/queue/" + item.uid, { method: "DELETE" });
            toast("Removed: " + item.song.title);
          } catch { toast("Failed to remove"); }
          refreshQueue();
        };
        li.append(handle, pos, meta, eta, rm);
        list.appendChild(li);
        handle.addEventListener("pointerdown", (e) => startDrag(e, li));
      });
      $("qempty").style.display = q.queue.length ? "none" : "block";
    } catch { /* server briefly unreachable */ }
  }

  // Pointer-based drag-to-reorder (native HTML5 DnD doesn't work well on touch).
  let dragActive = false;
  let dragLi = null;

  function startDrag(e, li) {
    e.preventDefault();
    dragActive = true;
    dragLi = li;
    li.classList.add("dragging");
    li.setPointerCapture(e.pointerId);
    li.addEventListener("pointermove", onDragMove);
    li.addEventListener("pointerup", onDragEnd);
    li.addEventListener("pointercancel", onDragEnd);
  }

  function onDragMove(e) {
    if (!dragLi) return;
    const list = $("queuelist");
    const under = document.elementFromPoint(e.clientX, e.clientY)?.closest("li");
    if (!under || under === dragLi || under.parentElement !== list) return;
    const rect = under.getBoundingClientRect();
    const before = e.clientY < rect.top + rect.height / 2;
    list.insertBefore(dragLi, before ? under : under.nextSibling);
  }

  async function onDragEnd(e) {
    if (!dragLi) return;
    dragLi.classList.remove("dragging");
    dragLi.removeEventListener("pointermove", onDragMove);
    dragLi.removeEventListener("pointerup", onDragEnd);
    dragLi.removeEventListener("pointercancel", onDragEnd);
    const list = $("queuelist");
    const newIndex = Array.from(list.children).indexOf(dragLi);
    const uid = dragLi.dataset.uid;
    dragLi = null;
    try {
      await fetch("/api/queue/" + uid, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ newIndex }),
      });
    } catch { toast("Failed to reorder"); }
    dragActive = false;
    refreshQueue();
  }

  $("search").addEventListener("input", render);
  loadSongs();
  refreshQueue();
  setInterval(refreshQueue, 4000);
</script>
</body>
</html>
